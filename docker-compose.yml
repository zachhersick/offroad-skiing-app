services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      APP_ENV: ${APP_ENV:-development}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      INTERNAL_API_BASE_URL: ${INTERNAL_API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-TerrainPilot}
    depends_on:
      - api
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/apps/web/node_modules
      - root-node-modules:/workspace/node_modules

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://terrainpilot:terrainpilot@postgres:5432/terrainpilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      ENABLE_LIVE_HTTP: ${ENABLE_LIVE_HTTP:-true}
      APPROVED_HTTP_HOSTS: ${APPROVED_HTTP_HOSTS:-api.open-meteo.com}
      RUN_INLINE_AGENT_JOBS: ${RUN_INLINE_AGENT_JOBS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - .:/workspace

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      - api
      - postgres
      - redis
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://terrainpilot:terrainpilot@postgres:5432/terrainpilot}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-too}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-mini}
      ENABLE_LIVE_HTTP: ${ENABLE_LIVE_HTTP:-true}
      APPROVED_HTTP_HOSTS: ${APPROVED_HTTP_HOSTS:-api.open-meteo.com}
      RUN_INLINE_AGENT_JOBS: ${RUN_INLINE_AGENT_JOBS:-false}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
    volumes:
      - .:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-terrainpilot}
      POSTGRES_USER: ${POSTGRES_USER:-terrainpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terrainpilot}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  web-node-modules:
  root-node-modules:
