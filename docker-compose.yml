services:
  web:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - .:/workspace
      - web-node-modules:/workspace/apps/web/node_modules
      - root-node-modules:/workspace/node_modules

  api:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/workspace

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - .env
    depends_on:
      - api
      - postgres
      - redis
    volumes:
      - .:/workspace

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-terrainpilot}
      POSTGRES_USER: ${POSTGRES_USER:-terrainpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-terrainpilot}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
  web-node-modules:
  root-node-modules:

