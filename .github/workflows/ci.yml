name: ci

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv pip install --system -e packages/agent-core -e apps/api -e apps/worker
      - run: pytest apps/api/tests packages/agent-core/tests

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: corepack enable
      - run: pnpm install --filter web... --filter @terrainpilot/shared...
      - run: pnpm --filter web lint

