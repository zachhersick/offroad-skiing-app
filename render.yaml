services:
  - type: web
    name: terrainpilot-api
    plan: free
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.api
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: terrainpilot-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: terrainpilot-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_MODEL
        value: gpt-5-mini
      - key: ENABLE_LIVE_HTTP
        value: true
      - key: APPROVED_HTTP_HOSTS
        value: api.open-meteo.com
      - key: RUN_INLINE_AGENT_JOBS
        value: true
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: terrainpilot-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: terrainpilot-web
    plan: free
    runtime: docker
    dockerfilePath: ./infra/docker/Dockerfile.web
    dockerContext: .
    healthCheckPath: /
    envVars:
      - key: APP_ENV
        value: production
      - key: INTERNAL_API_BASE_URL
        fromService:
          type: web
          name: terrainpilot-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_APP_NAME
        value: TerrainPilot
      - key: NEXT_PUBLIC_API_BASE_URL
        value: /api

  - type: keyvalue
    name: terrainpilot-redis
    plan: free

databases:
  - name: terrainpilot-db
    plan: free
    postgresMajorVersion: "16"
